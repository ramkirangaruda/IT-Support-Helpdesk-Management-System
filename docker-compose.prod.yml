# ─────────────────────────────────────────────────────────────────────────────
# TicketZilla — PRODUCTION compose (draft, produced by audit 2026-06-16)
#
# Differences vs the dev docker-compose.yml:
#   - Postgres / Redis / AI service are NOT published to the host (internal net only)
#   - Secrets come from the host environment (${VAR:?err}) — never baked into images
#   - Health checks + restart policies + resource limits on every service
#   - Only the web tier (and a loopback-bound API for a host TLS proxy) are exposed
#
# Usage:
#   export POSTGRES_PASSWORD=... JWT_SECRET=... REDIS_PASSWORD=... LLM_API_KEY=... \
#          GMAIL_CLIENT_ID=... GMAIL_CLIENT_SECRET=... GMAIL_REFRESH_TOKEN=... \
#          GMAIL_USER=... FRONTEND_URL=https://help.gov.example
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml run --rm api npx prisma migrate deploy
#
# Depends on these audit fixes to be fully clean:
#   - S7: make GET /api/health @Public() so the api healthcheck below works
#   - S1: ai-service has no host port here (internal only) — keep it that way
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ticketzilla}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-ticketzilla}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    mem_limit: 1g
    cpus: 1.0
    # no host port: only reachable on the internal compose network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    cpus: 0.5

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ticketzilla}
      - LLM_API_KEY=${LLM_API_KEY:?set LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - CHROMA_PATH=/data/chroma
    volumes:
      - chroma_data:/data/chroma
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 2g
    cpus: 2.0
    # no host port: called only by the api over the internal network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ticketzilla}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET:?set a strong JWT_SECRET}
      - AI_SERVICE_URL=http://ai-service:8000
      - FRONTEND_URL=${FRONTEND_URL:?set FRONTEND_URL}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN}
      - GMAIL_USER=${GMAIL_USER}
    ports:
      - "127.0.0.1:3000:3000"   # loopback only — front with a host TLS reverse proxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 1g
    cpus: 1.0

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"      # terminate TLS at an upstream LB / ingress, or add 443 + certs here
    depends_on:
      - api
    mem_limit: 256m
    cpus: 0.5

volumes:
  postgres_data:
  redis_data:
  chroma_data:
