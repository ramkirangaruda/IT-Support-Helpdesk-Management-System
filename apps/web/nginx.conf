# TicketZilla web (SPA) — served by non-root nginx on 8080.
server {
    listen       8080;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Static assets — long cache for hashed files.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to the NestJS service on the internal compose network.
    # Resolve the upstream lazily via Docker's embedded DNS (127.0.0.11) and a variable,
    # so nginx still starts when the api service isn't up yet / isn't on this network.
    location /api/ {
        resolver           127.0.0.11 ipv6=off valid=10s;
        set $upstream_api  api;
        proxy_pass         http://$upstream_api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Client-side routing — fall back to index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
